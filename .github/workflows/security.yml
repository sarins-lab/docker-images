name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Detect gitleaks license
        id: gitleaks_license
        shell: bash
        run: |
          if [ -n "${{ secrets.GITLEAKS_LICENSE }}" ]; then
            echo "has_license=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_license=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run gitleaks (official v2)
        if: steps.gitleaks_license.outputs.has_license == 'true'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Run gitleaks (v1 fallback without license)
        if: steps.gitleaks_license.outputs.has_license == 'false'
        uses: gitleaks/gitleaks-action@v1.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  trivy:
    name: Trivy Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Scan repository configuration and filesystem
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy filesystem SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-fs.sarif') != ''
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Build local image for vulnerability scan
        run: docker build --build-arg ALPINE_VERSION=3.22.1 -f alpine.dockerfile -t hardened-alpine-base:ci .

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: hardened-alpine-base:ci
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-image.sarif') != ''
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
